function saveEvento(){
  const name=document.getElementById('ev-name').value.trim();if(!name)return;
  const endRaw=document.getElementById('ev-end').value;
  events.push({id:uid(),name,endDate:endRaw?new Date(endRaw).getTime():null,goal:parseInt(document.getElementById('ev-goal').value)||100,progress:0,unit:document.getElementById('ev-unit').value||'puntos',notes:document.getElementById('ev-notes').value,createdAt:now()});
  save();closeModal('modal-add-evento');['ev-name','ev-end','ev-notes'].forEach(i=>document.getElementById(i).value='');document.getElementById('ev-goal').value=100;document.getElementById('ev-unit').value='puntos';render();
}
function delEvento(id){if(!confirm('¿Eliminar evento?'))return;events=events.filter(e=>e.id!==id);save();render()}
function updEvento(id,delta){events=events.map(e=>{if(e.id!==id)return e;return{...e,progress:Math.max(0,Math.min(e.goal,(e.progress||0)+delta))}}); save();render()}
function setEvento(id,val){events=events.map(e=>{if(e.id!==id)return e;return{...e,progress:Math.max(0,Math.min(e.goal,parseInt(val)||0))}});save();render()}
function renderEventos(){
  if(!events.length){document.getElementById('eventos-list').innerHTML=`<div class="empty"><div class="e-icon">📅</div><div class="e-text">Sin eventos activos</div><div class="e-sub">Añade eventos de temporada para trackear tu progreso</div></div>`;return}
  document.getElementById('eventos-list').innerHTML=events.map(ev=>{
    const pct=ev.goal>0?Math.min(100,((ev.progress||0)/ev.goal)*100):0;
    const timeLeft=ev.endDate?ev.endDate-now():null;const done=pct>=100;const expired=timeLeft!==null&&timeLeft<=0;const urgent=timeLeft&&timeLeft>0&&timeLeft<3600000*24;
    return `<div class="ev-card ${done?'done':''}">
      <div style="display:flex;justify-content:space-between;align-items:flex-start">
        <div style="flex:1">
          <div style="font-family:'Cinzel',serif;font-weight:700;font-size:14px;color:${done?'var(--green)':'var(--gold2)'}">${done?'✓ ':''}${ev.name}</div>
          ${timeLeft!==null?`<div style="font-size:10px;color:${expired?'var(--red)':urgent?'#ff9a40':'var(--muted)'};margin-top:2px">${expired?'⚠️ EVENTO TERMINADO':urgent?`⚠️ Termina en ${fmtTime(timeLeft)}`:`⏰ Termina en ${fmtTime(timeLeft)}`}</div>`:''}
        </div>
        <button class="btn-del" onclick="delEvento('${ev.id}')">✕</button>
      </div>
      <div style="margin-top:10px">
        <div style="display:flex;justify-content:space-between;font-size:11px;margin-bottom:4px">
          <span style="color:var(--muted);font-family:'Cinzel',serif;letter-spacing:.5px">PROGRESO</span>
          <span style="color:var(--gold)">${(ev.progress||0).toLocaleString()} / ${ev.goal.toLocaleString()} ${ev.unit} · ${pct.toFixed(1)}%</span>
        </div>
        <div style="height:12px;background:#0a0500;border-radius:6px;overflow:hidden;border:1px solid var(--border2)">
          <div class="pbar ${done?'pbar-green':'pbar-gold'}" style="width:${pct}%;height:100%;box-shadow:${done?'0 0 8px var(--green)':'0 0 6px var(--gold)'}"></div>
        </div>
        <div class="ev-controls">
          <button class="btn btn-muted btn-sm" onclick="updEvento('${ev.id}',-1)">−1</button>
          <input class="inp" type="number" value="${ev.progress||0}" onchange="setEvento('${ev.id}',this.value)" style="flex:1;min-width:60px;text-align:center;margin-bottom:0;padding:5px 8px;font-size:12px"/>
          <button class="btn btn-gold btn-sm" onclick="updEvento('${ev.id}',1)">＋1</button>
          <button class="btn btn-muted btn-sm" onclick="updEvento('${ev.id}',10)">＋10</button>
          <button class="btn btn-muted btn-sm" onclick="updEvento('${ev.id}',100)">＋100</button>
        </div>
      </div>
      ${ev.notes?`<div style="font-size:10px;color:var(--muted);margin-top:9px;font-style:italic;border-top:1px solid var(--border2);padding-top:7px">${ev.notes}</div>`:''}
    </div>`;
  }).join('');
}

/* ══ PIN LOCK ══ */
const PIN_ID = SYNC_ID + '_pin';
let appUnlocked = false;

async function sha256(str){
  const salted = '1123' + str + '1123';
  const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(salted));
  return Array.from(new Uint8Array(buf)).map(b=>b.toString(16).padStart(2,'0')).join('');
}

async function getPinHash(){
  try{
    const {data,error} = await sb.from('m2_accounts').select('pin_hash').eq('id',PIN_ID).single();
    if(!error && data?.pin_hash) return data.pin_hash;
    return localStorage.getItem('m2_pin_hash') || null;
  }catch(e){
    return localStorage.getItem('m2_pin_hash') || null;
  }
}

async function savePinHash(hash, len){
  try{
    await sb.from('m2_accounts').upsert({id:PIN_ID, pin_hash:hash, data:[], updated_at:new Date().toISOString()});
    localStorage.setItem('m2_pin_hash', hash);
    localStorage.setItem('m2_pin_len', len);
  }catch(e){
    localStorage.setItem('m2_pin_hash', hash);
    localStorage.setItem('m2_pin_len', len);
  }
}

function showLockScreen(mode='unlock'){
  const overlay = document.getElementById('pin-overlay');
  const title = document.getElementById('pin-title');
  const subtitle = document.getElementById('pin-subtitle');
  const dots = document.querySelectorAll('.pin-dot');
  const errorEl = document.getElementById('pin-error');
  title.textContent = mode==='create' ? '🔐 Crear PIN' : '🔒 Introduce tu PIN';
  subtitle.textContent = mode==='create' ? 'Elige un PIN de 6 dígitos' : 'Introduce tu PIN de 6 dígitos';
  errorEl.textContent = '';
  dots.forEach(d=>d.classList.remove('filled'));
  window._pinBuffer = '';
  window._pinMode = mode;
  overlay.style.display = 'flex';
}

function hideLockScreen(){
  document.getElementById('pin-overlay').style.display = 'none';
  appUnlocked = true;
}

function pinPress(val){
  const errorEl = document.getElementById('pin-error');
  if(val==='del'){
    window._pinBuffer = window._pinBuffer.slice(0,-1);
  } else {
    if(window._pinBuffer.length >= 6) return;
    window._pinBuffer += val;
  }
  // Update dots
  const dots = document.querySelectorAll('.pin-dot');
  dots.forEach((d,i)=> d.classList.toggle('filled', i < window._pinBuffer.length));

  if(window._pinBuffer.length >= 6){
    errorEl.textContent = '';
  }

  // Auto-confirm when 6 digits entered
  const pinLen = parseInt(localStorage.getItem('m2_pin_len')||'6');
  const targetLen = window._pinMode === 'unlock' ? pinLen : 6;
  if(window._pinBuffer.length >= targetLen){
    setTimeout(()=>pinConfirm(), 120);
  }
}

async function pinConfirm(){
  const pin = window._pinBuffer;
  const errorEl = document.getElementById('pin-error');
  if(pin.length < 6){ errorEl.textContent = 'Mínimo 6 dígitos'; return; }

  if(window._pinMode === 'create'){
    // Ask confirm
    if(!window._pinFirst){
      window._pinFirst = pin;
      document.getElementById('pin-title').textContent = '🔐 Confirma tu PIN';
      document.getElementById('pin-subtitle').textContent = 'Introduce el PIN otra vez';
      window._pinBuffer = '';
      document.querySelectorAll('.pin-dot').forEach(d=>d.classList.remove('filled'));
      return;
    }
    if(pin !== window._pinFirst){
      errorEl.textContent = 'Los PINs no coinciden, inténtalo de nuevo';
      window._pinFirst = null;
      window._pinBuffer = '';
      document.querySelectorAll('.pin-dot').forEach(d=>d.classList.remove('filled'));
      document.getElementById('pin-title').textContent = '🔐 Crear PIN';
      document.getElementById('pin-subtitle').textContent = 'Elige un PIN de 4 a 6 dígitos';
      return;
    }
    const hash = await sha256(pin);
    await savePinHash(hash, pin.length);
    hideLockScreen();
    render();
    pullFromSupabase();
  } else {
    const stored = await getPinHash();
    const entered = await sha256(pin);
    if(entered === stored){
      hideLockScreen();
      render();
      pullFromSupabase();
    } else {
      errorEl.textContent = 'PIN incorrecto';
      window._pinBuffer = '';
      document.querySelectorAll('.pin-dot').forEach(d=>d.classList.remove('filled'));
    }
  }
}

async function initPin(){
  const hash = await getPinHash();
  if(!hash){
    showLockScreen('create');
  } else {
    showLockScreen('unlock');
  }
}

setInterval(()=>{
  updateQuickStats();
  // Actualizar timers de buffs en el DOM directamente
  document.querySelectorAll('[data-buff-timer]').forEach(el=>{
    const aid=el.dataset.aid,cid=el.dataset.cid,bid=el.dataset.bid;
    const acc=accounts.find(a=>a.id===aid);
    const c=acc?.chars.find(x=>x.id===cid);
    if(!c)return;
    const exp=(c.activeBuffs||{})[bid];
    const left=exp?exp-now():0;
    el.textContent=left>0?fmtTime(left):'';
  });
  document.querySelectorAll('[data-buff-bar]').forEach(el=>{
    const aid=el.dataset.aid,cid=el.dataset.cid,bid=el.dataset.bid,total=parseInt(el.dataset.total)||1;
    const acc=accounts.find(a=>a.id===aid);
    const c=acc?.chars.find(x=>x.id===cid);
    if(!c)return;
    const exp=(c.activeBuffs||{})[bid];
    const left=exp?exp-now():0;
    el.style.width=left>0?Math.min(100,(left/total)*100)+'%':'0%';
  });
  document.querySelectorAll('[data-biolog-timer]').forEach(el=>{
    const aid=el.dataset.aid, cid=el.dataset.cid;
    const acc=accounts.find(a=>a.id===aid);
    const c=acc?.chars.find(x=>x.id===cid);
    if(!c)return;
    const dur=biologDurFromStage(c.biologStage);
    const left=dur>0&&c.biolog?(c.biolog+dur)-now():null;
    const ready=left!==null&&left<=0;
    if(left===null){el.textContent='Sin rastrear — pulsa Reset';el.className='timer-big idle';}
    else if(ready){el.textContent='✓ BIOLOG LISTO';el.className='timer-big ready';}
    else{el.textContent=fmtTime(left);el.className='timer-big active';}
  });
  // Actualizar barras de progreso
  document.querySelectorAll('[data-biolog-bar]').forEach(el=>{
    const aid=el.dataset.aid, cid=el.dataset.cid;
    const acc=accounts.find(a=>a.id===aid);
    const c=acc?.chars.find(x=>x.id===cid);
    if(!c)return;
    const dur=biologDurFromStage(c.biologStage);
    const left=dur>0&&c.biolog?(c.biolog+dur)-now():null;
    const ready=left!==null&&left<=0;
    const pct=c.biolog&&left>0?Math.max(0,(1-left/dur)*100):(ready?100:0);
    el.style.width=pct+'%';
    el.className='pbar '+(ready?'pbar-green':'pbar-gold');
  });
  // Actualizar timers de gear 6/7
  document.querySelectorAll('[data-gear-timer]').forEach(el=>{
    const aid=el.dataset.aid,cid=el.dataset.cid;
    const acc=accounts.find(a=>a.id===aid);
    const c=acc?.chars.find(x=>x.id===cid);
    if(!c||!c.activeGear)return;
    const g=(c.gear||{})[c.activeGear];
    const left=g?g.expiresAt-now():0;
    el.textContent=left>0?fmtTime(left):'EXPIRADO';
    el.style.color=left<=0?'var(--red)':left<=3600000?'#ff9a40':'var(--gold)';
  });
  document.querySelectorAll('[data-gear-bar]').forEach(el=>{
    const aid=el.dataset.aid,cid=el.dataset.cid;
    const acc=accounts.find(a=>a.id===aid);
    const c=acc?.chars.find(x=>x.id===cid);
    if(!c||!c.activeGear)return;
    const g=(c.gear||{})[c.activeGear];
    const left=g?g.expiresAt-now():0;
    el.style.width=left>0?Math.min(100,(left/GEAR_DUR)*100)+'%':'0%';
  });
  // Re-renderizar tabs que NO son biolog (los otros no tienen formularios problemáticos)
  checkAlerts();
  if(currentTab!=='biolog' && currentTab!=='buffs' && currentTab!=='seis7') render();
},1000);
